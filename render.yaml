# Render blueprint: one Docker web service + a managed Postgres instance.
# Secrets marked `sync: false` must be set in the Render dashboard.
services:
  - type: web
    name: sweet-potato
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    # Migrations run on start via the Dockerfile CMD.
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sweet-potato-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TEST_USER_EMAIL
        sync: false
      - key: TEST_USER_PASSWORD
        sync: false
      - key: HSK_LEVELS
        value: 1-3

databases:
  - name: sweet-potato-db
    plan: starter
