# Render blueprint: one Docker web service backed by a SQLite file on a
# persistent disk. Secrets marked `sync: false` must be set in the dashboard.
#
# Note: SQLite-on-disk pins this to a single instance (no horizontal scaling),
# which is fine for this app.
services:
  - type: web
    name: sweet-potato
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    # Migrations run on start via the Dockerfile CMD.
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Store the SQLite file (plus its WAL/SHM sidecars and audio BLOBs) on the
      # mounted disk so it survives deploys.
      - key: DATABASE_PATH
        value: /data/sweet-potato.db
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TEST_USER_EMAIL
        sync: false
      - key: TEST_USER_PASSWORD
        sync: false
      - key: HSK_LEVELS
        value: 1-3
