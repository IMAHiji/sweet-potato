services:
  postgres:
    image: postgres:16
    container_name: sweet-potato-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sweet_potato
    ports:
      - '5432:5432'
    volumes:
      - sweet_potato_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sweet_potato']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sweet_potato_pgdata:
